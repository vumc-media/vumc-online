<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<script src="https://js.churchcenter.com/modal/v1"></script>

<style>
:root{
  --border:#d8e0e6;
  --accent:#305f72;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #0f1115;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

.topbar{
  background:#17313d;
  color:#fff;
  padding:14px;
  text-align:center;
  font-size:14px;
  font-weight:700;
}

.wrap{
  max-width:1180px;
  margin:auto;
}

.nav-shell{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
}

.brand{
  font-size:24px;
  font-weight:700;
  color:#1f2933;
}

.brand a{
  text-decoration:none;
  color:inherit;
}

.nav-links{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}

.nav-links a{
  color:var(--accent);
  font-weight:700;
  text-decoration:none;
}

.nav-links a.active{
  color:#17313d;
}

#vumcShell {
  display:grid;
  grid-template-columns:1fr 420px;
  min-height:calc(100vh - 95px);
}

#playerWrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

.playerOverlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  z-index:2;
  background:
    linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.72)),
    radial-gradient(circle at center, rgba(48,95,114,0.20), transparent 55%);
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

.playerOverlay.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.overlayContent{
  text-align:center;
  max-width:540px;
  padding:28px 24px;
  border-radius:20px;
  background:rgba(10,14,22,0.72);
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:0 18px 40px rgba(0,0,0,0.35);
}

.overlayTitle{
  font-size:30px;
  font-weight:800;
  margin-bottom:10px;
}

.overlayText{
  font-size:16px;
  margin-bottom:12px;
}

.overlayTimes{
  font-size:15px;
  font-weight:700;
}

#vumcSidebar{
  background:#15181f;
  border-left:1px solid rgba(255,255,255,.08);
}

#vumcSidebarInner{
  padding:16px;
}

.vumcTabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.vumcTabBtn{
  flex:1;
  background:#262a33;
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:12px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.vumcTabBtn.active{
  background:#d4af37;
  color:#111;
}

.vumcTabPane{
  display:none;
}

.vumcTabPane.active{
  display:block;
}

.vumcCard{
  background:#262a33;
  border-radius:16px;
  overflow:hidden;
}

#vumcNotesFrame{
  width:100%;
  height:600px;
  background:#fff;
}
</style>
</head>

<body>

<div class="topbar">
  VUMC Online is an extension of the ministry and community of Versailles United Methodist Church
</div>

<div class="nav-shell">
  <div class="wrap nav">
    <div class="brand"><a href="/">VUMC Online</a></div>
    <div class="nav-links">
      <a class="active" href="/watch">Worship</a>
      <a href="/prayer">Prayer</a>
      <a href="/community">Community</a>
      <a href="/support">Give</a>
    </div>
  </div>
</div>

<div id="vumcShell">

  <main>
    <div id="playerWrap">
      <iframe
        src="https://www.youtube.com/embed/live_stream?channel=UC_svgodM3blLqWEBQ5yNjmA&autoplay=1&mute=1"
        allowfullscreen>
      </iframe>

      <div id="playerOverlay" class="playerOverlay">
        <div class="overlayContent">
          <div class="overlayTitle">Worship With Us</div>
          <div class="overlayText">Join us Sundays online</div>
          <div class="overlayTimes">9:30 AM & 10:30 AM</div>
        </div>
      </div>
    </div>
  </main>

  <aside id="vumcSidebar">
    <div id="vumcSidebarInner">

      <div class="vumcTabs">
        <button class="vumcTabBtn active" data-tab="notes">Sermon Notes</button>
        <button class="vumcTabBtn" data-tab="checkin">Check In</button>
        <button class="vumcTabBtn" data-tab="prayer">Prayer</button>
      </div>

      <div id="tab-notes" class="vumcTabPane active">
        <div class="vumcCard">
          <iframe id="vumcNotesFrame" src="https://sermon.versaillesumc.org"></iframe>
        </div>
      </div>

    </div>
  </aside>

</div>

<script>
function isSundayServiceWindow() {
  const now = new Date();
  const day = now.getDay();
  const minutes = now.getHours() * 60 + now.getMinutes();
  return day === 0 && minutes >= 555 && minutes <= 720;
}

function updateOverlay() {
  const overlay = document.getElementById("playerOverlay");
  if (isSundayServiceWindow()) {
    overlay.classList.add("hidden");
  } else {
    overlay.classList.remove("hidden");
  }
}

updateOverlay();
setInterval(updateOverlay, 60000);
</script>

</body>
</html>
