<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<script src="https://js.churchcenter.com/modal/v1"></script>

<style>
:root{
  --border:#d8e0e6;
  --accent:#305f72;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #0f1115;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

.topbar{
  background:#17313d;
  color:#fff;
  padding:14px;
  text-align:center;
  font-size:14px;
  font-weight:700;
}

.wrap{
  max-width:1180px;
  margin:auto;
}

.nav-shell{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
}

.brand{
  font-size:24px;
  font-weight:700;
  color:#1f2933;
}

.brand a{
  text-decoration:none;
  color:inherit;
}

.nav-links{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}

.nav-links a{
  color:var(--accent);
  font-weight:700;
  text-decoration:none;
}

.nav-links a.active{
  color:#17313d;
}

#vumcShell {
  display:grid;
  grid-template-columns:1fr 420px;
  min-height:calc(100vh - 95px);
}

/* PLAYER WRAP */
#playerWrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

/* 🔥 OVERLAY */
.playerOverlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  pointer-events:none;

  background:linear-gradient(
    to top,
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.25),
    rgba(0,0,0,0)
  );
}

.overlayContent{
  text-align:center;
  margin-bottom:20px;
  padding:12px 18px;
  border-radius:14px;
  backdrop-filter:blur(6px);
  background:rgba(0,0,0,0.35);
}

.overlayTitle{
  font-size:16px;
  font-weight:700;
}

.overlayTimes{
  font-size:14px;
  opacity:.85;
  margin-top:4px;
}

/* SIDEBAR */
#vumcSidebar{
  background:#15181f;
  border-left:1px solid rgba(255,255,255,.08);
}

#vumcSidebarInner{
  padding:16px;
}

.vumcTabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.vumcTabBtn{
  flex:1;
  background:#262a33;
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:12px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.vumcTabBtn.active{
  background:#d4af37;
  color:#111;
}

.vumcTabPane{
  display:none;
}

.vumcTabPane.active{
  display:block;
}

.vumcCard{
  background:#262a33;
  border-radius:16px;
  overflow:hidden;
}

#vumcNotesFrame{
  width:100%;
  height:600px;
  background:#fff;
}

.vumcFormCard{
  padding:16px;
  background:#262a33;
  border-radius:16px;
}

.vumcSubmitBtn{
  width:100%;
  background:#d4af37;
  color:#111;
  padding:12px;
  border-radius:12px;
  font-weight:800;
  border:0;
  cursor:pointer;
  text-decoration:none;
}

@media (max-width:980px){
  #vumcShell{
    grid-template-columns:1fr;
  }

  #vumcSidebar{
    display:none;
  }
}
</style>
</head>

<body>

<div class="topbar">
  VUMC Online is an extension of the ministry and community of Versailles United Methodist Church
</div>

<div class="nav-shell">
  <div class="wrap nav">
    <div class="brand"><a href="/">VUMC Online</a></div>
    <div class="nav-links">
      <a class="active" href="/watch">Worship</a>
      <a href="/prayer">Prayer</a>
      <a href="/community">Community</a>
      <a href="/support">Give</a>
    </div>
  </div>
</div>

<div id="vumcShell">

  <!-- PLAYER -->
  <main>
    <div id="playerWrap">

      <iframe
        src="https://www.youtube.com/embed/live_stream?channel=UC_svgodM3blLqWEBQ5yNjmA&autoplay=1&mute=1&rel=0&playsinline=1"
        allowfullscreen>
      </iframe>

      <!-- 🔥 OVERLAY -->
      <div class="playerOverlay">
        <div class="overlayContent">
          <div class="overlayTitle">Join Us for Worship</div>
          <div class="overlayTimes">Sundays • 9:30 AM & 10:30 AM</div>
        </div>
      </div>

    </div>
  </main>

  <!-- SIDEBAR -->
  <aside id="vumcSidebar">
    <div id="vumcSidebarInner">

      <div class="vumcTabs">
        <button id="notesTabBtn" class="vumcTabBtn active" data-tab="notes">Sermon Notes</button>
        <button class="vumcTabBtn" data-tab="checkin">Check In</button>
        <button class="vumcTabBtn" data-tab="prayer">Prayer</button>
      </div>

      <div id="tab-notes" class="vumcTabPane active">
        <div class="vumcCard">
          <iframe id="vumcNotesFrame" src="https://sermon.versaillesumc.org"></iframe>
        </div>
      </div>

      <div id="tab-checkin" class="vumcTabPane">
        <div class="vumcFormCard" style="text-align:center;">
          <h3>Check In for Worship</h3>
          <a href="https://versaillesumc.churchcenter.com/people/forms/859778"
             data-open-in-church-center-modal="true"
             class="vumcSubmitBtn">Check In Now</a>
        </div>
      </div>

      <div id="tab-prayer" class="vumcTabPane">
        <div class="vumcFormCard" style="text-align:center;">
          <h3>Prayer Request</h3>
          <a href="/prayer" class="vumcSubmitBtn">Submit Prayer Request</a>
        </div>
      </div>

    </div>
  </aside>

</div>

<script>
function shouldShowSermonNotes() {
  const now = new Date();
  const day = now.getDay();
  const minutes = now.getHours()*60 + now.getMinutes();
  return day === 0 && minutes >= 555 && minutes <= 720; // 9:15–12:00
}

function activateTab(tabName){
  document.querySelectorAll(".vumcTabBtn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".vumcTabPane").forEach(p=>p.classList.remove("active"));

  document.querySelector('[data-tab="'+tabName+'"]').classList.add("active");
  document.getElementById("tab-"+tabName).classList.add("active");
}

document.querySelectorAll(".vumcTabBtn").forEach(btn=>{
  btn.onclick=()=>activateTab(btn.dataset.tab);
});

(function(){
  if(!shouldShowSermonNotes()){
    document.getElementById("notesTabBtn").style.display="none";
    document.getElementById("tab-notes").style.display="none";
    activateTab("checkin");
  }
})();
</script>

</body>
</html>
