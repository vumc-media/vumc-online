<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUMC Watch Live</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: #0f1115;
}

/* HOME BUTTON (ONLY NAV) */
.vumcBackWrap {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
}

.vumcBackBtn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(15,17,21,.78);
  border: 1px solid rgba(255,255,255,.12);
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 20px rgba(0,0,0,.24);
}

.vumcBackThumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

/* LAYOUT */
#vumcShell {
  display: grid;
  grid-template-columns: 1fr 420px;
  min-height: 100vh;
}

#vumcFrame {
  position: relative;
  width: 100%;
  min-height: 100vh;
  background: #000;
}

#vumcLiveFrame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: none;
}

/* OFFLINE */
#vumcOffline {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(0,0,0,.4), rgba(0,0,0,.4)),
    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVeu24CGoxKiGKIMqt16SMry2rYHrAFStWTA&s') center/cover;
}

#vumcInner {
  max-width: 700px;
  background: rgba(0,0,0,.65);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

/* COUNTDOWN */
#vumcCountdown {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.vumcBox {
  background: #fff;
  color: #000;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
}

/* SIDEBAR */
#vumcSidebar {
  background: #15181f;
  padding: 16px;
}

/* TABS */
.vumcTabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.vumcTabBtn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  background: #262a33;
  border: 1px solid rgba(255,255,255,.08);
  color: #fff;
  cursor: pointer;
}

.vumcTabBtn.active {
  background: #d4af37;
  color: #000;
}

.vumcTabPane { display: none; }
.vumcTabPane.active { display: block; }

/* CARDS */
.vumcCard {
  background: #262a33;
  border-radius: 14px;
  padding: 14px;
}

/* FORMS */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #d4af37;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

/* MOBILE */
@media (max-width:980px){
  #vumcShell { grid-template-columns:1fr; }
  #vumcSidebar { display:none; }
}
</style>
</head>

<body>

<!-- HOME BUTTON -->
<div class="vumcBackWrap">
  <a href="index.html" class="vumcBackBtn">
    <img src="https://yt3.googleusercontent.com/0VzY1FMygvH9BmYV_gu_hNyZsW1kY5VPDdeRtHxyzfcXtqM5Rc6Kongrr_dw3v5I_hwJv63vIQ=s900-c-k-c0x00ffffff-no-rj" class="vumcBackThumb">
    Home
  </a>
</div>

<div id="vumcShell">

<!-- MAIN VIDEO -->
<main>
<div id="vumcFrame">

<iframe id="vumcLiveFrame"></iframe>

<div id="vumcOffline">
<div id="vumcInner">

<h2>Next Service Begins In</h2>

<div id="vumcCountdown">
<div class="vumcBox" id="h">00</div>
<div class="vumcBox" id="m">00</div>
<div class="vumcBox" id="s">00</div>
</div>

<p>Sunday 9:30am & 10:30am</p>

</div>
</div>

</div>
</main>

<!-- SIDEBAR -->
<aside id="vumcSidebar">

<div class="vumcTabs">
<button class="vumcTabBtn active" data-tab="notes">Notes</button>
<button class="vumcTabBtn" data-tab="chat">Chat</button>
<button class="vumcTabBtn" data-tab="checkin">Check In</button>
<button class="vumcTabBtn" data-tab="prayer">Prayer</button>
</div>

<div id="tab-notes" class="vumcTabPane active">
<div class="vumcCard">Sermon notes appear during live stream.</div>
</div>

<div id="tab-chat" class="vumcTabPane">
<div class="vumcCard">Chat available when live.</div>
</div>

<div id="tab-checkin" class="vumcTabPane">
<form id="checkinForm">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email">
<select name="service">
<option>9:30 Traditional</option>
<option>10:30 Contemporary</option>
</select>
<button type="submit">Check In</button>
</form>
</div>

<div id="tab-prayer" class="vumcTabPane">
<form id="prayerForm">
<textarea name="request" placeholder="Prayer request"></textarea>
<button type="submit">Submit</button>
</form>
</div>

</aside>

</div>

<script>
// SIMPLE TAB SWITCH
document.querySelectorAll(".vumcTabBtn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".vumcTabBtn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".vumcTabPane").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
  };
});
</script>

</body>
</html>
