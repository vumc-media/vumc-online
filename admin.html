<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eCampus Admin Login | VUMC Online</title>

<style>
  body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    color:#1f2933;
  }

  .wrap {
    max-width:700px;
    margin:40px auto;
    padding:20px;
  }

  .card {
    background:#fff;
    border-radius:18px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }

  h1 {
    margin-top:0;
  }

  .subtext {
    color:#52606d;
    font-size:14px;
    margin-bottom:18px;
  }

  .field {
    margin-bottom:14px;
  }

  label {
    display:block;
    font-weight:700;
    margin-bottom:6px;
    font-size:14px;
  }

  input, select, textarea {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d8e0e6;
    font-size:14px;
    box-sizing:border-box;
  }

  textarea {
    min-height:120px;
  }

  .loginBtn {
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    background:#305f72;
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }

  .submitWrap {
    text-align:center;
    margin-top:18px;
  }

  .submitBtn {
    width:auto;
    min-width:180px;
    padding:12px 24px;
    border-radius:999px;
    border:none;
    background:#ffd65a;
    color:#1f2933;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(255, 214, 90, .35);
  }

  .status {
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    display:none;
  }

  .success {
    background:#e6f7ef;
    color:#1b7a46;
  }

  .error {
    background:#fdecea;
    color:#a33a3a;
  }

  #adminPanel {
    display:none;
  }

  .topBar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }

  .topBarTitle {
    margin:0;
  }

  .logoutBtn {
    width:auto;
    padding:10px 18px;
    border-radius:999px;
    border:none;
    background:#dfe7ec;
    color:#243b53;
    font-weight:700;
    cursor:pointer;
  }

  .smallNote {
    font-size:13px;
    color:#7b8794;
    margin-top:6px;
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- LOGIN CARD -->
  <div class="card" id="loginCard">
    <h1>eCampus Admin Login</h1>
    <div class="subtext">Staff access only</div>

    <div class="field">
      <label for="adminPassword">Password</label>
      <input type="#LoveLikeJesus" id="adminPassword" placeholder="Enter admin password">
    </div>

    <button class="loginBtn" id="loginBtn">Login</button>

    <div id="loginMsg" class="status"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="card" id="adminPanel">
    <div class="topBar">
      <div>
        <h1 class="topBarTitle">Create Community Post</h1>
        <div class="smallNote">Post updates to the VUMC Online community feed.</div>
      </div>
      <button class="logoutBtn" id="logoutBtn" type="button">Log Out</button>
    </div>

    <form id="postForm">

      <div class="field">
        <label>Status</label>
        <select id="status">
          <option value="publish">Publish Now</option>
          <option value="scheduled">Schedule</option>
          <option value="draft">Save Draft</option>
        </select>
      </div>

      <div class="field" id="scheduleField" style="display:none;">
        <label>Schedule Date &amp; Time</label>
        <input type="datetime-local" id="publish_at">
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" required>
      </div>

      <div class="field">
        <label>Content</label>
        <textarea id="content" required></textarea>
      </div>

      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="update">Update</option>
          <option value="prayer">Prayer Prompt</option>
          <option value="event">Event</option>
          <option value="story">Story</option>
        </select>
      </div>

      <div class="field">
        <label>Author</label>
        <input type="text" id="author" value="VUMC Online">
      </div>

      <div class="field">
        <label>Image URL (optional)</label>
        <input type="text" id="image">
      </div>

      <div class="field">
        <label>Link (optional)</label>
        <input type="text" id="link">
      </div>

      <div class="submitWrap">
        <button class="submitBtn" type="submit">Submit Post</button>
      </div>

      <div id="statusMsg" class="status"></div>

    </form>
  </div>
</div>

<script>
  // LOGIN SCRIPT URL
  const LOGIN_ENDPOINT = "https://script.google.com/macros/s/AKfycbzJjFgPvDAiuRusNyYkW5ShO35QWsnIOBcku3lgeJK1-OQp3i70ZXjfxGiE5_M39S0YSg/exec";

  // EXISTING POST ENDPOINT
  const POST_ENDPOINT = "https://script.google.com/macros/s/AKfycbzJjFgPvDAiuRusNyYkW5ShO35QWsnIOBcku3lgeJK1-OQp3i70ZXjfxGiE5_M39S0YSg/exec";

  const loginCard = document.getElementById("loginCard");
  const adminPanel = document.getElementById("adminPanel");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginMsg = document.getElementById("loginMsg");

  const form = document.getElementById("postForm");
  const statusSelect = document.getElementById("status");
  const scheduleField = document.getElementById("scheduleField");
  const statusMsg = document.getElementById("statusMsg");

  // show scheduled date field only when needed
  statusSelect.addEventListener("change", () => {
    if (statusSelect.value === "scheduled") {
      scheduleField.style.display = "block";
    } else {
      scheduleField.style.display = "none";
    }
  });

  // restore session if already logged in
  if (sessionStorage.getItem("vumcAdminLoggedIn") === "true") {
    loginCard.style.display = "none";
    adminPanel.style.display = "block";
  }

  loginBtn.addEventListener("click", async () => {
    loginMsg.style.display = "none";

    const password = document.getElementById("adminPassword").value.trim();

    if (!password) {
      loginMsg.className = "status error";
      loginMsg.innerText = "Please enter the password.";
      loginMsg.style.display = "block";
      return;
    }

    try {
      const res = await fetch(LOGIN_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: "login",
          password: password
        })
      });

      const data = await res.json();

      if (data.ok) {
        sessionStorage.setItem("vumcAdminLoggedIn", "true");
        loginCard.style.display = "none";
        adminPanel.style.display = "block";
      } else {
        loginMsg.className = "status error";
        loginMsg.innerText = "Incorrect password.";
        loginMsg.style.display = "block";
      }
    } catch (err) {
      loginMsg.className = "status error";
      loginMsg.innerText = "Login could not be completed.";
      loginMsg.style.display = "block";
    }
  });

  logoutBtn.addEventListener("click", () => {
    sessionStorage.removeItem("vumcAdminLoggedIn");
    adminPanel.style.display = "none";
    loginCard.style.display = "block";
    document.getElementById("adminPassword").value = "";
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    statusMsg.style.display = "none";

    const payload = {
      status: document.getElementById("status").value,
      date: new Date(),
      publish_at: document.getElementById("publish_at").value,
      title: document.getElementById("title").value,
      content: document.getElementById("content").value,
      type: document.getElementById("type").value,
      author: document.getElementById("author").value,
      image: document.getElementById("image").value,
      link: document.getElementById("link").value
    };

    try {
      const res = await fetch(POST_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (data.ok) {
        form.reset();
        scheduleField.style.display = "none";
        document.getElementById("author").value = "VUMC Online";

        statusMsg.className = "status success";
        statusMsg.innerText = "Post submitted successfully!";
        statusMsg.style.display = "block";
      } else {
        throw new Error(data.error || "Error");
      }

    } catch (err) {
      statusMsg.className = "status error";
      statusMsg.innerText = "Something went wrong. Try again.";
      statusMsg.style.display = "block";
    }
  });
</script>

</body>
</html>
