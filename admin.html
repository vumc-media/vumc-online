<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eCampus Admin Login | VUMC Online</title>
<link rel="icon" href="/favicon.ico">

<style>
body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f8;
  color:#1f2933;
}
.wrap {
  max-width:700px;
  margin:40px auto;
  padding:20px;
}
.card {
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1 { margin-top:0; }
.subtext {
  color:#52606d;
  font-size:14px;
  margin-bottom:18px;
}
.field { margin-bottom:14px; }
label {
  display:block;
  font-weight:700;
  margin-bottom:6px;
  font-size:14px;
}
input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d8e0e6;
  font-size:14px;
  box-sizing:border-box;
}
textarea {
  min-height:140px;
  resize:vertical;
}
.loginBtn, .submitBtn {
  border-radius:999px;
  border:none;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
}
.loginBtn {
  width:100%;
  padding:14px;
  background:#305f72;
  color:#fff;
}
.submitWrap {
  text-align:center;
  margin-top:18px;
}
.submitBtn {
  min-width:180px;
  padding:12px 24px;
  background:#ffd65a;
  color:#1f2933;
  box-shadow:0 8px 20px rgba(255,214,90,.35);
}
.logoutBtn {
  width:auto;
  padding:10px 18px;
  border-radius:999px;
  border:none;
  background:#dfe7ec;
  color:#243b53;
  font-weight:700;
  cursor:pointer;
}
.status {
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  display:none;
}
.success {
  background:#e6f7ef;
  color:#1b7a46;
}
.error {
  background:#fdecea;
  color:#a33a3a;
}
#adminPanel { display:none; }
.topBar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}
.topBarTitle { margin:0; }
.smallNote {
  font-size:13px;
  color:#7b8794;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card" id="loginCard">
    <h1>eCampus Admin Login</h1>
    <div class="subtext">Staff access only</div>

    <div class="field">
      <label for="adminPassword">Password</label>
      <input type="password" id="adminPassword" placeholder="Enter admin password">
    </div>

    <button class="loginBtn" id="loginBtn">Login</button>
    <div id="loginMsg" class="status"></div>
  </div>

  <div class="card" id="adminPanel">
    <div class="topBar">
      <div>
        <h1 class="topBarTitle">Create Community Post</h1>
        <div class="smallNote">Post updates to the VUMC Online community feed.</div>
      </div>
      <button class="logoutBtn" id="logoutBtn" type="button">Log Out</button>
    </div>

    <form id="postForm">

      <div class="field">
        <label>Status</label>
        <select id="status">
          <option value="publish">Publish Now</option>
          <option value="scheduled">Schedule</option>
          <option value="draft">Save Draft</option>
        </select>
      </div>

      <div class="field" id="scheduleField" style="display:none;">
        <label>Schedule Date &amp; Time</label>
        <input type="datetime-local" id="publish_at">
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" required>
      </div>

      <div class="field">
        <label>Content</label>
        <textarea id="content" required></textarea>
      </div>

      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="update">Update</option>
          <option value="prayer">Prayer Prompt</option>
          <option value="event">Event</option>
          <option value="story">Story</option>
        </select>
      </div>

      <div class="field">
        <label>Author</label>
        <input type="text" id="author" value="VUMC Online">
      </div>

      <div class="field">
        <label>Image URL (optional)</label>
        <input type="text" id="image">
      </div>

      <div class="field">
        <label>Link (optional)</label>
        <input type="text" id="link">
      </div>

      <div class="submitWrap">
        <button class="submitBtn" type="submit">Submit Post</button>
      </div>

      <div id="statusMsg" class="status"></div>

    </form>
  </div>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbwDGjG3nxgmxnGhxB-q26WShFmBXGkxQI-9pT6q7UzcgLI5Xi6oet2CPkXlu0feZpWX/exec";

const loginCard = document.getElementById("loginCard");
const adminPanel = document.getElementById("adminPanel");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const loginMsg = document.getElementById("loginMsg");

const form = document.getElementById("postForm");
const statusSelect = document.getElementById("status");
const scheduleField = document.getElementById("scheduleField");
const publishAtInput = document.getElementById("publish_at");
const statusMsg = document.getElementById("statusMsg");

function showMessage(el, type, message) {
  el.className = "status " + type;
  el.innerText = message;
  el.style.display = "block";
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = "jsonp_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    window[callbackName] = function(data) {
      delete window[callbackName];
      script.remove();
      resolve(data);
    };

    const script = document.createElement("script");
    script.src = url + "&callback=" + callbackName;
    script.onerror = function() {
      delete window[callbackName];
      script.remove();
      reject(new Error("Request failed."));
    };

    document.body.appendChild(script);
  });
}

function showAdmin() {
  loginCard.style.display = "none";
  adminPanel.style.display = "block";
}

function showLogin() {
  loginCard.style.display = "block";
  adminPanel.style.display = "none";
}

const storedToken = sessionStorage.getItem("vumcAdminToken");
if (storedToken) {
  showAdmin();
}

statusSelect.addEventListener("change", () => {
  if (statusSelect.value === "scheduled") {
    scheduleField.style.display = "block";
    publishAtInput.required = true;
  } else {
    scheduleField.style.display = "none";
    publishAtInput.required = false;
    publishAtInput.value = "";
  }
});

loginBtn.addEventListener("click", async () => {
  loginMsg.style.display = "none";

  const password = document.getElementById("adminPassword").value.trim();

  if (!password) {
    showMessage(loginMsg, "error", "Please enter the password.");
    return;
  }

  const params = new URLSearchParams({
    action: "login",
    password: password
  });

  try {
    const data = await jsonp(ENDPOINT + "?" + params.toString());

    if (data.ok && data.token) {
      sessionStorage.setItem("vumcAdminToken", data.token);
      document.getElementById("adminPassword").value = "";
      showAdmin();
    } else {
      showMessage(loginMsg, "error", data.error || "Incorrect password.");
    }
  } catch (err) {
    showMessage(loginMsg, "error", "Login could not be completed.");
  }
});

logoutBtn.addEventListener("click", () => {
  sessionStorage.removeItem("vumcAdminToken");
  window.location.href = "https://online.versaillesumc.org/";
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusMsg.style.display = "none";

  const token = sessionStorage.getItem("vumcAdminToken");

  if (!token) {
    showMessage(statusMsg, "error", "You are not logged in.");
    showLogin();
    return;
  }

  if (statusSelect.value === "scheduled" && !publishAtInput.value) {
    showMessage(statusMsg, "error", "Please choose a schedule date and time.");
    return;
  }

  const params = new URLSearchParams({
    action: "create",
    token: token,
    status: statusSelect.value,
    date: new Date().toISOString(),
    publish_at: publishAtInput.value || "",
    title: document.getElementById("title").value.trim(),
    content: document.getElementById("content").value.trim(),
    type: document.getElementById("type").value,
    author: document.getElementById("author").value.trim() || "VUMC Online",
    image: document.getElementById("image").value.trim(),
    link: document.getElementById("link").value.trim()
  });

  try {
    const data = await jsonp(ENDPOINT + "?" + params.toString());

    if (data.ok) {
      form.reset();
      document.getElementById("author").value = "VUMC Online";
      scheduleField.style.display = "none";
      publishAtInput.required = false;

      showMessage(statusMsg, "success", "Post submitted successfully!");
    } else {
      showMessage(statusMsg, "error", data.error || "Something went wrong.");
    }
  } catch (err) {
    showMessage(statusMsg, "error", "Something went wrong. Try again.");
  }
});
</script>

</body>
</html>
