<script>

const endpoint = "https://script.google.com/macros/s/AKfycbwDGjG3nxgmxnGhxB-q26WShFmBXGkxQI-9pT6q7UzcgLI5Xi6oet2CPkXlu0feZpWX/exec";

const feedContainer = document.getElementById("communityFeed");

// ✅ Clean, human-friendly date
function formatDate(dateString) {
  const date = new Date(dateString);

  return date.toLocaleString("en-US", {
    month: "long",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

// 🔥 Build each post
function renderPost(post) {
  return `
    <div class="feed-item">
      <div class="feed-tag">${post.type || "Update"}</div>
      <div class="feed-title">${post.title}</div>
      <div class="meta">
        Posted ${formatDate(post.date)}
      </div>
      <div>${post.content}</div>
      ${post.link ? `<div style="margin-top:10px;"><a href="${post.link}" target="_blank">Learn more →</a></div>` : ""}
    </div>
  `;
}

// 🚀 Load feed
async function loadFeed() {
  try {
    const res = await fetch(endpoint + "?t=" + Date.now());
    const posts = await res.json();

    if (!posts.length) {
      feedContainer.innerHTML = "<p>No posts yet. Check back soon.</p>";
      return;
    }

    feedContainer.innerHTML = posts.map(renderPost).join("");

  } catch (err) {
    feedContainer.innerHTML = "<p>The community feed could not be loaded right now.</p>";
  }
}

loadFeed();

</script>
