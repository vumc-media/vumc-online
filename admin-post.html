<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Post | VUMC Online</title>

<style>
  body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    color:#1f2933;
  }

  .wrap {
    max-width:700px;
    margin:40px auto;
    padding:20px;
  }

  .card {
    background:#fff;
    border-radius:18px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }

  h1 {
    margin-top:0;
  }

  .field {
    margin-bottom:14px;
  }

  label {
    display:block;
    font-weight:700;
    margin-bottom:6px;
    font-size:14px;
  }

  input, select, textarea {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d8e0e6;
    font-size:14px;
  }

  textarea {
    min-height:120px;
  }

  button {
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    background:#305f72;
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }

  .status {
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    display:none;
  }

  .success {
    background:#e6f7ef;
    color:#1b7a46;
  }

  .error {
    background:#fdecea;
    color:#a33a3a;
  }

</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <h1>Create Community Post</h1>

    <form id="postForm">

      <div class="field">
        <label>Status</label>
        <select id="status">
          <option value="publish">Publish Now</option>
          <option value="scheduled">Schedule</option>
          <option value="draft">Save Draft</option>
        </select>
      </div>

      <div class="field" id="scheduleField" style="display:none;">
        <label>Schedule Date & Time</label>
        <input type="datetime-local" id="publish_at">
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" required>
      </div>

      <div class="field">
        <label>Content</label>
        <textarea id="content" required></textarea>
      </div>

      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="update">Update</option>
          <option value="prayer">Prayer Prompt</option>
          <option value="event">Event</option>
          <option value="story">Story</option>
        </select>
      </div>

      <div class="field">
        <label>Author</label>
        <input type="text" id="author" value="VUMC Online">
      </div>

      <div class="field">
        <label>Image URL (optional)</label>
        <input type="text" id="image">
      </div>

      <div class="field">
        <label>Link (optional)</label>
        <input type="text" id="link">
      </div>

      <button type="submit">Post</button>

      <div id="statusMsg" class="status"></div>

    </form>

  </div>
</div>

<script>

const endpoint = "https://script.google.com/macros/s/AKfycbwDGjG3nxgmxnGhxB-q26WShFmBXGkxQI-9pT6q7UzcgLI5Xi6oet2CPkXlu0feZpWX/exec";

const form = document.getElementById("postForm");
const statusSelect = document.getElementById("status");
const scheduleField = document.getElementById("scheduleField");
const statusMsg = document.getElementById("statusMsg");

statusSelect.addEventListener("change", () => {
  if (statusSelect.value === "scheduled") {
    scheduleField.style.display = "block";
  } else {
    scheduleField.style.display = "none";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusMsg.style.display = "none";

  const payload = {
    status: document.getElementById("status").value,
    date: new Date(), // AUTO DATE
    publish_at: document.getElementById("publish_at").value,
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    type: document.getElementById("type").value,
    author: document.getElementById("author").value,
    image: document.getElementById("image").value,
    link: document.getElementById("link").value
  };

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.ok) {
      form.reset();
      statusMsg.className = "status success";
      statusMsg.innerText = "Post submitted successfully!";
      statusMsg.style.display = "block";
    } else {
      throw new Error(data.error || "Error");
    }

  } catch (err) {
    statusMsg.className = "status error";
    statusMsg.innerText = "Something went wrong. Try again.";
    statusMsg.style.display = "block";
  }

});

</script>

</body>
</html>
