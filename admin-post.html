<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Post | VUMC Online</title>
<!-- redeployed GAS test -->

<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
<link rel="manifest" href="/site.webmanifest">

<style>
  body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    color:#1f2933;
  }

  .wrap {
    max-width:700px;
    margin:40px auto;
    padding:20px;
  }

  .card {
    background:#fff;
    border-radius:18px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }

  h1 { margin-top:0; }

  .field { margin-bottom:14px; }

  label {
    display:block;
    font-weight:700;
    margin-bottom:6px;
    font-size:14px;
  }

  input, select, textarea {
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border-radius:10px;
    border:1px solid #d8e0e6;
    font-size:14px;
  }

  textarea {
    min-height:160px;
    resize:vertical;
  }

  button {
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    background:#305f72;
    color:#fff;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }

  button:disabled {
    opacity:.65;
    cursor:not-allowed;
  }

  .status {
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    display:none;
    white-space:pre-wrap;
    font-size:14px;
  }

  .success {
    background:#e6f7ef;
    color:#1b7a46;
  }

  .error {
    background:#fdecea;
    color:#a33a3a;
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <h1>Create Community Post</h1>

    <form id="postForm">

      <div class="field">
        <label for="status">Status</label>
        <select id="status">
          <option value="publish">Publish Now</option>
          <option value="scheduled">Schedule</option>
          <option value="draft">Save Draft</option>
        </select>
      </div>

      <div class="field" id="scheduleField" style="display:none;">
        <label for="publish_at">Schedule Date & Time</label>
        <input type="datetime-local" id="publish_at">
      </div>

      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" required>
      </div>

      <div class="field">
        <label for="content">Content</label>
        <textarea id="content" required></textarea>
      </div>

      <div class="field">
        <label for="type">Type</label>
        <select id="type">
          <option value="update">Update</option>
          <option value="prayer">Prayer Prompt</option>
          <option value="event">Event</option>
          <option value="story">Story</option>
        </select>
      </div>

      <div class="field">
        <label for="author">Author</label>
        <input type="text" id="author" value="VUMC Online">
      </div>

      <div class="field">
        <label for="image">Image URL (optional)</label>
        <input type="url" id="image">
      </div>

      <div class="field">
        <label for="link">Link (optional)</label>
        <input type="url" id="link">
      </div>

      <button id="submitBtn" type="submit">Post</button>

      <div id="statusMsg" class="status"></div>

    </form>

  </div>
</div>

<script>
const endpoint = "https://script.google.com/macros/s/AKfycbwDGjG3nxgmxnGhxB-q26WShFmBXGkxQI-9pT6q7UzcgLI5Xi6oet2CPkXlu0feZpWX/exec";

const form = document.getElementById("postForm");
const statusSelect = document.getElementById("status");
const scheduleField = document.getElementById("scheduleField");
const publishAtInput = document.getElementById("publish_at");
const statusMsg = document.getElementById("statusMsg");
const submitBtn = document.getElementById("submitBtn");

function showMessage(type, message) {
  statusMsg.className = "status " + type;
  statusMsg.innerText = message;
  statusMsg.style.display = "block";
}

statusSelect.addEventListener("change", () => {
  if (statusSelect.value === "scheduled") {
    scheduleField.style.display = "block";
    publishAtInput.required = true;
  } else {
    scheduleField.style.display = "none";
    publishAtInput.required = false;
    publishAtInput.value = "";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusMsg.style.display = "none";

  if (statusSelect.value === "scheduled" && !publishAtInput.value) {
    showMessage("error", "Please choose a schedule date and time.");
    return;
  }

  const payload = {
    status: statusSelect.value,
    date: new Date().toISOString(),
    publish_at: publishAtInput.value || "",
    title: document.getElementById("title").value.trim(),
    content: document.getElementById("content").value.trim(),
    type: document.getElementById("type").value,
    author: document.getElementById("author").value.trim() || "VUMC Online",
    image: document.getElementById("image").value.trim(),
    link: document.getElementById("link").value.trim()
  };

  submitBtn.disabled = true;
  submitBtn.innerText = "Submitting...";

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const rawText = await res.text();

    let data;
    try {
      data = JSON.parse(rawText);
    } catch (jsonError) {
      throw new Error("The Google Apps Script did not return JSON.\n\nResponse received:\n" + rawText.substring(0, 500));
    }

    if (data.ok === true) {
      form.reset();
      document.getElementById("author").value = "VUMC Online";
      scheduleField.style.display = "none";
      publishAtInput.required = false;

      showMessage("success", "Post submitted successfully!");
    } else {
      throw new Error(data.error || "Google Apps Script returned an error.");
    }

  } catch (err) {
    showMessage("error", "Something went wrong:\n\n" + err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerText = "Post";
  }
});
</script>

</body>
</html>
