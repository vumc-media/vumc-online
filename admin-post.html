<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Post | VUMC Online</title>
  <style>
    :root{
      --bg:#f4f6f8;--card:#ffffff;--text:#1f2933;--muted:#5b6875;--accent:#305f72;--border:#d8e0e6;--shadow:0 10px 30px rgba(24,39,52,.08);--radius:20px;--max:820px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    .topbar{background:#17313d;color:#fff;padding:14px 20px;text-align:center;font-size:14px}
    .wrap{max-width:var(--max);margin:0 auto;padding:28px 20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}
    h1{margin:0 0 10px}
    p{color:var(--muted)}
    .field{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 15px;
      font:inherit;
      background:#fff;
      color:var(--text);
    }
    textarea{min-height:180px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn{
      border:0;
      border-radius:999px;
      padding:14px 20px;
      font:inherit;
      font-weight:700;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
    }
    .status{display:none;margin-top:14px;padding:12px 14px;border-radius:14px;font-size:14px}
    .status.success{display:block;background:#e7f6ee;color:#1d5e3a;border:1px solid #b9dfc8}
    .status.error{display:block;background:#fdeeee;color:#8a2b2b;border:1px solid #efc5c5}
    @media (max-width:700px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">VUMC Online Admin</div>

  <div class="wrap">
    <div class="card">
      <h1>Create Community Post</h1>
      <p>This form writes directly to your Community Feed sheet.</p>

      <form id="postForm">
        <div class="row">
          <div class="field">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="publish">Publish now</option>
              <option value="draft">Save as draft</option>
            </select>
          </div>

          <div class="field">
            <label for="type">Type</label>
            <select id="type" name="type">
              <option value="update">Update</option>
              <option value="prayer">Prayer</option>
              <option value="story">Story</option>
              <option value="event">Event</option>
              <option value="next step">Next Step</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="author">Author</label>
            <input id="author" name="author" type="text" value="VUMC" />
          </div>

          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" />
          </div>
        </div>

        <div class="field">
          <label for="title">Title</label>
          <input id="title" name="title" type="text" required />
        </div>

        <div class="field">
          <label for="content">Content</label>
          <textarea id="content" name="content" required></textarea>
        </div>

        <div class="field">
          <label for="link">Optional Link</label>
          <input id="link" name="link" type="text" placeholder="watch.html or https://..." />
        </div>

        <div class="field">
          <label for="image">Optional Image URL</label>
          <input id="image" name="image" type="text" />
        </div>

        <button id="submitBtn" class="btn" type="submit">Post to Community Feed</button>
        <div id="formStatus" class="status"></div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "PASTE_YOUR_COMMUNITY_SCRIPT_URL_HERE";
    const form = document.getElementById("postForm");
    const submitBtn = document.getElementById("submitBtn");
    const formStatus = document.getElementById("formStatus");

    function setStatus(type, message) {
      formStatus.className = "status " + type;
      formStatus.textContent = message;
    }

    function clearStatus() {
      formStatus.className = "status";
      formStatus.textContent = "";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearStatus();

      const payload = {
        status: form.status.value,
        type: form.type.value,
        author: form.author.value.trim(),
        date: form.date.value || "",
        title: form.title.value.trim(),
        content: form.content.value.trim(),
        link: form.link.value.trim(),
        image: form.image.value.trim()
      };

      if (!payload.title || !payload.content) {
        setStatus("error", "Please complete the title and content.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("Request failed: " + res.status);

        const result = await res.json();

        if (result && result.ok) {
          form.reset();
          form.author.value = "VUMC";
          setStatus("success", "Community post saved successfully.");
        } else {
          throw new Error((result && result.error) || "Unknown error");
        }
      } catch (err) {
        setStatus("error", "The post could not be saved right now.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Post to Community Feed";
      }
    });
  </script>
</body>
</html>
